<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DALY工具箱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      width: 380px;
      min-height: 400px;
      background: #f0f2f5;
      color: #333;
    }

    /* ===== Header ===== */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
    }
    .header h1 {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      flex: 1;
    }
    .header .about-btn {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .header .about-btn:hover { background: rgba(255,255,255,0.28); }

    /* ===== Content ===== */
    .content { padding: 12px; }

    /* Section 标题 */
    .section-title {
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 8px 2px 6px;
      margin-top: 2px;
      font-weight: 600;
    }

    /* ===== Grid Cards (4列小卡片) ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 12px 6px;
      text-align: center;
      text-decoration: none;
      color: #333;
      transition: all 0.2s;
      cursor: pointer;
      border: 1px solid #f0f0f0;
      display: block;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(102,126,234,0.15);
      border-color: #c9c3ff;
    }
    .card-icon {
      width: 36px;
      height: 36px;
      margin: 0 auto 6px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .card-title {
      font-size: 11px;
      line-height: 1.3;
      word-break: break-all;
      color: #555;
      font-weight: 500;
    }

    /* Icon 背景色 */
    .icon-pdd { background: linear-gradient(135deg, #FF4D4F, #FF7875); }
    .icon-ai { background: linear-gradient(135deg, #1890ff, #69c0ff); }
    .icon-chanmama { background: linear-gradient(135deg, #eb2f96, #ff85c0); }
    .icon-wuhen { background: linear-gradient(135deg, #52c41a, #95de64); }
    .icon-wangdian { background: linear-gradient(135deg, #f5222d, #ff7875); }
    .icon-jushuitan { background: linear-gradient(135deg, #13c2c2, #5cdbd3); }
    .icon-duozan { background: linear-gradient(135deg, #fa8c16, #ffc53d); }
    .icon-wanli { background: linear-gradient(135deg, #722ed1, #b37feb); }
    .icon-fengsu { background: linear-gradient(135deg, #8c8c8c, #bfbfbf); }

    /* ===== 代发管理（2列宽卡片）===== */
    .grid-wide {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .grid-wide .card {
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
    }
    .grid-wide .card-icon {
      width: 36px;
      height: 36px;
      margin: 0;
      flex-shrink: 0;
    }
    .grid-wide .card-title { font-size: 12px; }

    /* ===== 无痕单区域 ===== */
    .panel-hidden { display: none; }
    .panel-wuhen { padding-top: 4px; }
    .wuhen-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .back-btn {
      background: #f0f0f0;
      border: none;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      color: #666;
      transition: all 0.15s;
    }
    .back-btn:hover { background: #e0e0e0; }
    .wuhen-header h3 { font-size: 14px; font-weight: 600; flex: 1; }

    .input-group { margin-bottom: 10px; }
    .input-group label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .input-group input {
      width: 100%;
      padding: 9px 10px;
      border: 1.5px solid #e8e8e8;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      background: #fafafa;
    }
    .input-group input:focus { border-color: #667eea; background: #fff; box-shadow: 0 0 0 3px rgba(102,126,234,0.08); }
    .generate-btn {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    .generate-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.3); }
    .result-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      border: 1px solid #f0f0f0;
    }
    .result-card h4 { font-size: 13px; margin-bottom: 10px; color: #555; }
    .qr-container { margin: 8px auto; width: 180px; height: 180px; }
    .qr-container canvas, .qr-container img { max-width: 100% !important; border-radius: 8px; }
    .result-card small { color: #bbb; font-size: 11px; }

    /* ===== 关于页面 ===== */
    .about-container { padding-top: 4px; }
    .about-body { text-align: center; }
    .about-info {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      border: 1px solid #f0f0f0;
    }
    .about-info p { font-size: 15px; color: #333; font-weight: 500; }
    .qr-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .qr-card {
      background: #fff;
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      border: 1px solid #f0f0f0;
    }
    .qr-card h4 { font-size: 12px; margin-bottom: 8px; color: #555; }
    .qr-card img { width: 100%; border-radius: 6px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <img src="./icons/daly.png" alt="DALY" class="logo">
    <h1>DALY工具箱</h1>
    <button class="about-btn" id="aboutBtn">关于作者</button>
  </div>

  <!-- 主内容区（无Tab，全部平铺） -->
  <div class="content">

    <!-- 快捷工具 -->
    <div class="section-title">⚡ 快捷工具</div>
    <div class="grid">
      <a href="https://mms.pinduoduo.com/" target="_blank" class="card">
        <div class="card-icon icon-pdd">📦</div>
        <div class="card-title">拼多多商家后台</div>
      </a>
      <a href="https://chatgpt.com/" target="_blank" class="card">
        <div class="card-icon icon-ai">🤖</div>
        <div class="card-title">AI主图设计</div>
      </a>
      <a href="https://www.chanmama.com/promotionRank/" target="_blank" class="card">
        <div class="card-icon icon-chanmama">📊</div>
        <div class="card-title">蝉妈妈选品</div>
      </a>
      <div class="card card-btn" id="wuhenBtn">
        <div class="card-icon icon-wuhen">🔒</div>
        <div class="card-title">无痕单</div>
      </div>
    </div>

    <!-- 代发管理 -->
    <div class="section-title">📋 代发管理</div>
    <div class="grid-wide">
      <a href="https://erp.huice.com/#/app/order/fenxiao/pending-order" target="_blank" class="card">
        <div class="card-icon icon-wangdian">🏪</div>
        <div class="card-title">旺店通ERP</div>
      </a>
      <a href="https://gyl.scm121.com/channel/my/order/tower/distribute" target="_blank" class="card">
        <div class="card-icon icon-jushuitan">💧</div>
        <div class="card-title">聚水潭</div>
      </a>
      <a href="https://easyfx.duozan.com/#/bill/proxy" target="_blank" class="card">
        <div class="card-icon icon-duozan">📋</div>
        <div class="card-title">多赞代发</div>
      </a>
      <a href="https://erp.hupun.com/frame/e_drp_d_64" target="_blank" class="card">
        <div class="card-icon icon-wanli">🐂</div>
        <div class="card-title">万里牛ERP</div>
      </a>
      <a href="https://biaoqian.fengsutb.com/distribution/pushmanagement/unpushunship" target="_blank" class="card">
        <div class="card-icon icon-fengsu">📝</div>
        <div class="card-title">风速打单</div>
      </a>
    </div>

  </div>

  <!-- 无痕单子面板（默认隐藏） -->
  <div id="wuhen" class="panel-hidden panel-wuhen">
    <div class="content">
      <div class="wuhen-header">
        <button class="back-btn" id="backFromWuhen">← 返回</button>
        <h3>智能无痕单生成</h3>
      </div>
      <div class="input-group">
        <label>商品SKU ID</label>
        <input type="text" id="skuId" placeholder="输入商品SKU ID">
      </div>
      <div class="input-group">
        <label>商品ID</label>
        <input type="text" id="goodsId" placeholder="输入商品ID">
      </div>
      <div class="input-group">
        <label>购买数量</label>
        <input type="number" id="quantity" value="1" min="1">
      </div>
      <button class="generate-btn" id="generateBtn">⚡ 立即生成</button>
      <div class="result-card">
        <h4>📲 扫码下单</h4>
        <div id="qrcode" class="qr-container"></div>
        <small>手机扫码直接购买</small>
      </div>
    </div>
  </div>

  <!-- 关于作者子面板（默认隐藏） -->
  <div id="about" class="panel-hidden about-container">
    <div class="content">
      <div class="wuhen-header">
        <button class="back-btn" id="backFromAbout">← 返回</button>
        <h3>关于作者</h3>
      </div>
      <div class="about-body">
        <div class="about-info">
          <p>微信：-liudali</p>
        </div>
        <div class="qr-section">
          <div class="qr-card">
            <h4>📱 微信二维码</h4>
            <img src="./icons/wechat-qr.png" alt="微信二维码">
          </div>
          <div class="qr-card">
            <h4>💰 赞赏码</h4>
            <img src="./icons/zanshang.png" alt="赞赏码">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./qrcode.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
