<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DALY工具箱 - 侧边栏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      color: #333;
      background: #f5f6fa;
      width: 320px;
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* 顶部 */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 16px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header img.logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
    }
    .header-info {
      font-size: 11px;
      opacity: 0.85;
      line-height: 1.4;
    }

    /* Tab 切换 */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 72px;
      z-index: 99;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #666;
      transition: all 0.2s;
      position: relative;
    }
    .tab-btn.active {
      color: #667eea;
      font-weight: 600;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 2px;
      background: #667eea;
      border-radius: 1px;
    }

    /* 内容区 */
    .tab-panel { display: none; padding: 12px; }
    .tab-panel.active { display: block; }

    /* 卡片网格 */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 14px 8px;
      text-align: center;
      text-decoration: none;
      color: #333;
      transition: all 0.2s;
      cursor: pointer;
      border: 1px solid #f0f0f0;
      display: block;
    }
    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
      border-color: #d0ceff;
    }
    .card-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 8px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .card-icon.pdd { background: linear-gradient(135deg, #f60, #ff8533); }
    .card-icon.ai { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .card-icon.duozan { background: linear-gradient(135deg, #ee0979, #ff6a00); }
    .card-icon.wuhen { background: linear-gradient(135deg, #11998e, #38ef7d); }
    .card-icon.wangdian { background: linear-gradient(135deg, #e91e63, #f06292); }
    .card-icon.jushuitan { background: linear-gradient(135deg, #00bcd4, #03a9f4); }
    .card-icon.duozan2 { background: linear-gradient(135deg, #ff9800, #ffc107); }
    .card-icon.wanli { background: linear-gradient(135deg, #673ab7, #9575cd); }
    .card-icon.fengsu { background: linear-gradient(135deg, #795548, #a1887f); }
    .card-title {
      font-size: 12px;
      line-height: 1.3;
      word-break: break-all;
    }

    /* 分隔标题 */
    .section-title {
      font-size: 12px;
      color: #999;
      padding: 8px 0 4px;
      margin-top: 4px;
    }

    /* 无痕单区域 */
    .wuhen-container { padding-top: 4px; }
    .wuhen-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .back-btn {
      background: #f0f0f0;
      border: none;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      color: #666;
    }
    .back-btn:hover { background: #e0e0e0; }
    .wuhen-header h3 { font-size: 14px; flex: 1; }
    .input-group { margin-bottom: 10px; }
    .input-group label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    .input-group input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: #667eea; }
    .generate-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .generate-btn:hover { opacity: 0.9; }
    .result-card {
      background: #fff;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      border: 1px solid #f0f0f0;
    }
    .result-card h4 { font-size: 13px; margin-bottom: 10px; color: #555; }
    .qr-container { margin: 8px 0; }
    .qr-container canvas, .qr-container img { max-width: 160px !important; }
    .result-card small { color: #aaa; font-size: 11px; }

    /* 关于页面 */
    .about-container { padding-top: 4px; }
    .about-body { text-align: center; }
    .about-info {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 12px;
      border: 1px solid #f0f0f0;
    }
    .about-info p { font-size: 14px; color: #333; }
    .qr-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .qr-card {
      background: #fff;
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
      border: 1px solid #f0f0f0;
    }
    .qr-card h4 { font-size: 12px; margin-bottom: 8px; color: #555; }
    .qr-card img { width: 100%; border-radius: 6px; }

    /* 数据展示区（工具栏数据） */
    .data-section {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #f0f0f0;
    }
    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .data-row:last-child { border-bottom: none; }
    .data-label { font-size: 12px; color: #888; }
    .data-value { font-size: 14px; font-weight: 600; color: #333; }
    .data-value.highlight { color: #667eea; }
    .no-data { text-align: center; color: #ccc; padding: 16px; font-size: 12px; }

    /* 快捷操作按钮 */
    .action-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 6px;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      font-size: 13px;
      color: #444;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }
    .action-btn:hover {
      border-color: #667eea;
      color: #667eea;
      background: #f8f7ff;
    }

    /* 页面信息 */
    .page-info {
      background: #fff8e1;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #8d6e03;
      border: 1px solid #ffe082;
    }
    .page-info strong { color: #f57c00; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <img src="./icons/daly.png" alt="DALY" class="logo">
      <h1>DALY工具箱</h1>
    </div>
    <div class="header-info" id="pageInfo">检测当前页面中...</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="main">功能</button>
    <button class="tab-btn" data-tab="tools">快捷</button>
  </div>

  <!-- 主功能面板 -->
  <div id="panel-main" class="tab-panel active">

    <!-- 当前页面信息 -->
    <div id="currentPageInfo" class="page-info" style="display:none;">
      当前页面：<strong id="currentSiteName"></strong>
    </div>

    <!-- 平台数据 -->
    <div id="platformData" class="data-section" style="display:none;">
      <div class="data-row"><span class="data-label">支付金额</span><span class="data-value highlight" id="sp-deal">--</span></div>
      <div class="data-row"><span class="data-label">访客数</span><span class="data-value" id="sp-visitors">--</span></div>
      <div class="data-row"><span class="data-label">订单数</span><span class="data-value" id="sp-orders">--</span></div>
      <div class="data-row"><span class="data-label">转化率</span><span class="data-value" id="sp-conversion">--</span></div>
      <div class="data-row"><span class="data-label">待发货</span><span class="data-value" id="sp-pending">--</span></div>
      <div class="data-row"><span class="data-label">工单</span><span class="data-value" id="sp-ticket">--</span></div>
    </div>

    <!-- 常用功能 -->
    <div class="section-title">常用功能</div>
    <div class="grid">
      <a href="https://mms.pinduoduo.com/" target="_blank" class="card">
        <div class="card-icon pdd">📦</div>
        <div class="card-title">拼多多商家后台</div>
      </a>
      <a href="#" class="card" id="sp-aiBtn">
        <div class="card-icon ai">🤖</div>
        <div class="card-title">AI主图设计</div>
      </a>
      <a href="https://www.chanmama.com/promotionRank/" target="_blank" class="card">
        <div class="card-icon duozan">📊</div>
        <div class="card-title">蝉妈妈选品</div>
      </a>
      <div class="card card-btn" id="sp-wuhenBtn">
        <div class="card-icon wuhen">🔒</div>
        <div class="card-title">无痕单</div>
      </div>
    </div>

    <!-- 代发管理 -->
    <div class="section-title">代发管理</div>
    <div class="grid">
      <a href="https://erp.huice.com/#/app/order/fenxiao/pending-order" target="_blank" class="card">
        <div class="card-icon wangdian">🏪</div>
        <div class="card-title">旺店通</div>
      </a>
      <a href="https://gyl.scm121.com/channel/my/order/tower/distribute" target="_blank" class="card">
        <div class="card-icon jushuitan">💧</div>
        <div class="card-title">聚水潭</div>
      </a>
      <a href="https://easyfx.duozan.com/#/bill/proxy" target="_blank" class="card">
        <div class="card-icon duozan2">📋</div>
        <div class="card-title">多赞</div>
      </a>
      <a href="https://erp.hupun.com/frame/e_drp_d_64" target="_blank" class="card">
        <div class="card-icon wanli">🐂</div>
        <div class="card-title">万里牛</div>
      </a>
      <a href="https://biaoqian.fengsutb.com/distribution/pushmanagement/unpushunship" target="_blank" class="card">
        <div class="card-icon fengsu">📝</div>
        <div class="card-title">风速打单</div>
      </a>
    </div>
  </div>

  <!-- 快捷操作面板 -->
  <div id="panel-tools" class="tab-panel">
    <button class="action-btn" id="btn-refresh-data">🔄 刷新页面数据</button>
    <button class="action-btn" id="btn-open-pdd-mms">📦 拼多多MMS后台</button>
    <button class="action-btn" id="btn-open-orders">📋 订单管理</button>
    <button class="action-btn" id="btn-open-products">🏷️ 商品管理</button>
    <button class="action-btn" id="btn-open-datacenter">📊 数据中心</button>
    <button class="action-btn" id="btn-open-cs">💬 客服中心</button>
    <button class="action-btn" id="btn-open-marketing">🎯 营销中心</button>
  </div>

  <!-- 无痕单子面板 -->
  <div id="panel-wuhen" class="tab-panel">
    <div class="wuhen-container">
      <div class="wuhen-header">
        <button class="back-btn" data-goto="main">← 返回</button>
        <h3>智能无痕单生成</h3>
      </div>
      <div class="wuhen-body">
        <div class="input-group">
          <label>商品SKU ID</label>
          <input type="text" id="skuId" placeholder="输入商品SKU ID">
        </div>
        <div class="input-group">
          <label>商品ID</label>
          <input type="text" id="goodsId" placeholder="输入商品ID">
        </div>
        <div class="input-group">
          <label>购买数量</label>
          <input type="number" id="quantity" value="1" min="1">
        </div>
        <button class="generate-btn" id="generateBtn">⚡ 立即生成</button>
        <div class="result-card">
          <h4>📲 扫码下单</h4>
          <div id="qrcode" class="qr-container"></div>
          <small>手机扫码直接购买</small>
        </div>
      </div>
    </div>
  </div>

  <script src="./qrcode.min.js"></script>
  <script src="./sidepanel.js"></script>
</body>
</html>
